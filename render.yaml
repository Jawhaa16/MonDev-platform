services:
  # Backend API
  - type: web
    name: mondev-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mondev-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://mondev-backend.onrender.com/api/auth/google/callback
      - key: QPAY_USERNAME
        sync: false
      - key: QPAY_PASSWORD
        sync: false
      - key: QPAY_API_URL
        value: https://merchant.qpay.mn/v2
      - key: QPAY_INVOICE_CODE
        value: MONDEV_INVOICE
      - key: BACKEND_URL
        value: https://mondev-backend.onrender.com
      - key: FRONTEND_URL
        value: https://mondev.mn
      - key: PLATFORM_FEE_PERCENT
        value: 15
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://mondev.mn","http://localhost:3000"]'

  # Frontend
  - type: web
    name: mondev-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mondev-backend.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://mondev.mn

# Database
databases:
  - name: mondev-db
    databaseName: mondev
    user: mondev
    plan: starter
